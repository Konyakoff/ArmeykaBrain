<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ArmeykaBrain - ИИ Юрист{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    
    <!-- Google Fonts (non-blocking via media swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Onest:wght@700;800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Onest:wght@700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- FontAwesome Icons (only solid + regular, not all) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/regular.min.css">
    
    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            main: '#F47920',
                            orangeHover: '#e0681b',
                            dark: '#333333',
                            lightBg: '#fdf9f6',
                            inputBg: '#fcf6f2',
                            inputBorder: '#f0dfd1'
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        heading: ['Onest', 'Montserrat', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(244, 121, 32, 0.08)',
                        'card': '0 8px 30px rgba(0,0,0,0.04)'
                    }
                }
            }
        }
    </script>
    
    <!-- Marked.js for Markdown parsing (defer to not block first paint) -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="/static/css/style.css?v=4.7">
    <!-- Avatar modal: все стили карточек задаются inline через JS (ui.js).
         Здесь ничего не определяем, чтобы исключить конфликты с Tailwind CDN. -->
    {% block extra_head %}{% endblock %}
</head>
<body class="text-brand-dark min-h-screen relative overflow-x-hidden">

    <div class="fixed right-[-100px] bottom-[-100px] w-96 h-96 bg-brand-main rounded-full blur-[100px] opacity-10 pointer-events-none z-[-1]"></div>

    <div class="max-w-4xl mx-auto p-4 py-12 flex flex-col gap-8 relative z-10">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4">
            <div class="mb-6 md:mb-0">
                <a href="/" class="text-4xl sm:text-5xl font-black text-brand-dark tracking-tighter uppercase flex items-center flex-wrap gap-2 hover:opacity-90 transition-opacity">
                    АРМЕЙКА
                    <img src="/static/img/star_rounded.webp" alt="*" class="w-8 h-8 sm:w-10 sm:h-10 animate-[pulse_2s_ease-in-out_infinite]" width="40" height="40" loading="eager" />
                    NET <span class="normal-case text-3xl sm:text-4xl ml-1 text-gray-700">Brain</span>
                </a>
                <p class="text-gray-500 text-base sm:text-lg mt-2 font-medium tracking-wide">{% block subtitle %}ИИ-штаб маркетинга{% endblock %}</p>
            </div>
            <div class="flex flex-col items-end gap-1">
                {% block header_actions %}
                <button onclick="downloadDB()" class="bg-brand-main hover:bg-brand-orangeHover text-white font-bold px-6 py-3 transition-all duration-300 flex items-center gap-3 shadow-soft btn-organic">
                    <i class="fas fa-cloud-download-alt"></i>
                    Скачать dialogs.db
                </button>
                {% endblock %}
                <button id="btn-refresh-cache" onclick="refreshExternalCache()" class="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 px-2 py-0.5 rounded transition-colors">
                    <i class="fas fa-sync-alt text-[10px]"></i>
                    <span id="refresh-cache-label">обновить базу</span>
                </button>
            </div>
        </header>

        {% block content %}{% endblock %}

    </div>

    <!-- Global Avatar Modal -->
    <div id="avatar-modal" class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-5xl max-h-[90vh] flex flex-col transform scale-95 transition-transform duration-300" id="avatar-modal-content">
            <!-- Header -->
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <h3 class="text-lg font-bold text-gray-800">Выберите аватар</h3>
                <button onclick="closeAvatarModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <!-- Body (Grid) -->
            <div id="avatar-modal-grid" class="custom-scrollbar">
                <!-- Аватары: рендерятся JS с inline-стилями (ui.js) -->
            </div>
        </div>
    </div>

    <script defer src="/static/js/ui.js?v=4.4"></script>
    <script defer src="/static/js/api.js?v=4.0"></script>
    <script>document.addEventListener('DOMContentLoaded', initCacheStatus);</script>
    {% block scripts %}{% endblock %}
</body>
</html>
